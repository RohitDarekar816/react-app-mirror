version: "1.0"
commands:
  code_review:
    description: "Analyze code changes using Qodo Merge and provide categorized feedback"
    
    instructions: |
      You are an expert code reviewer. Your task is to:
      
      1. Analyze the provided code changes using Qodo Merge improve tool
      2. Categorize findings into: Critical, High, Medium, Low priority
      3. Provide specific, actionable feedback for each issue
      4. Suggest concrete improvements with code examples
      5. Check for security vulnerabilities, performance issues, and maintainability concerns
      6. Ensure code follows best practices and team standards
      7. Send a formatted report to RocketChat if notify_rocketchat is enabled
      
      Focus on:
      - Security vulnerabilities and potential exploits
      - Performance bottlenecks and optimization opportunities  
      - Code maintainability and readability
      - Adherence to coding standards and conventions
      - Proper error handling and edge cases
      - Test coverage for new functionality
      
      Provide constructive feedback that helps developers improve their code quality.
      
      After completing the code review and generating the JSON output, if notify_rocketchat is true, send a formatted report to the RocketChat webhook URL:
      
      1. Create a formatted message with the review results
      2. Include critical and high severity issues prominently
      3. Add a summary with total issues and approval status
      4. Send via HTTP POST to the rocketchat_webhook URL
      5. Handle any webhook errors gracefully without failing the review
    
    arguments:
      - name: "target_branch"
        type: "string"
        required: false
        default: "main"
        description: "Target branch to compare against"
      - name: "severity_threshold"
        type: "string"
        required: false
        default: "medium"
        description: "Minimum severity level to report (low, medium, high, critical)"
      - name: "include_suggestions"
        type: "boolean"
        required: false
        default: "true"
        description: "Include improvement suggestions"
      - name: "focus_areas"
        type: "string"
        required: false
        description: "Comma-separated list of focus areas (security, performance, maintainability)"
      - name: "exclude_files"
        type: "string"
        required: false
        description: "Comma-separated list of file patterns to exclude"
      - name: "rocketchat_webhook"
        type: "string"
        required: false
        default: "${ROCKETCHAT_WEBHOOK_URL}"
        description: "RocketChat webhook URL for notifications"
      - name: "notify_rocketchat"
        type: "boolean"
        required: false
        default: "true"
        description: "Send code review report to RocketChat"
    
    tools: ["qodo_merge", "git", "filesystem", "http"]
    execution_strategy: "act"
    
    output_schema: |
      {
        "type": "object",
        "properties": {
          "summary": {
            "type": "object",
            "properties": {
              "total_issues": {"type": "number"},
              "critical_issues": {"type": "number"},
              "high_issues": {"type": "number"},
              "medium_issues": {"type": "number"},
              "low_issues": {"type": "number"},
              "files_reviewed": {"type": "number"},
              "overall_score": {"type": "number", "minimum": 0, "maximum": 10}
            },
            "required": ["total_issues", "critical_issues", "high_issues", "medium_issues", "low_issues", "files_reviewed", "overall_score"]
          },
          "issues": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "file": {"type": "string"},
                "line": {"type": "number"},
                "severity": {"type": "string", "enum": ["critical", "high", "medium", "low"]},
                "category": {"type": "string"},
                "title": {"type": "string"},
                "description": {"type": "string"},
                "suggestion": {"type": "string"},
                "code_example": {"type": "string"}
              },
              "required": ["file", "severity", "category", "title", "description"]
            }
          },
          "suggestions": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "file": {"type": "string"},
                "type": {"type": "string"},
                "description": {"type": "string"},
                "implementation": {"type": "string"}
              },
              "required": ["file", "type", "description"]
            }
          },
          "approved": {"type": "boolean"},
          "requires_changes": {"type": "boolean"}
        },
        "required": ["summary", "issues", "approved", "requires_changes"]
      }
    
    exit_expression: "approved"