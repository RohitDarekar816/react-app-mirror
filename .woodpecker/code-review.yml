when:
  - event: manual
    branch: master
  - event: push
    branch: master

skip_clone: true

steps:
  - name: code-review
    image: sh
    commands:
      - git clone https://$GITEA_USERNAME:$GITEA_TOKEN@gitea.hivefinty.com/admin/react-app.git
      - cd react-app
      - export QODO_API_KEY="$QODO_API_KEY"
      - export GOOGLE_CHAT_WEBHOOK_URL="$GOOGLE_CHAT_WEBHOOK_URL"
      - qodo code_review --exclude_files=".woodpecker/**,agents/**,node_modules/**,code_review.yml" --severity_threshold=low --ci
      - git config user.email "$GIT_COMMIT_EMAIL"
      - git config user.name "$GIT_COMMIT_NAME"
      - git remote add mirror https://github.com/RohitDarekar816/react-app-mirror.git
      - git add .
      - git commit -m "chore:${CI_COMMIT_SHA} mirror push"
      - git push --mirror https://$GIT_USERNAME:$GIT_TOKEN@github.com/RohitDarekar816/react-app-mirror.git
    environment:
      QODO_API_KEY:
        from_secret: QODO_API_KEY
      GOOGLE_CHAT_WEBHOOK_URL:
        from_secret: GOOGLE_CHAT_WEBHOOK_URL
      GIT_TOKEN:
        from_secret: GIT_TOKEN
      GIT_USERNAME:
        from_secret: GIT_USERNAME
      GIT_COMMIT_EMAIL:
        from_secret: GIT_COMMIT_EMAIL
      GIT_COMMIT_NAME:
        from_secret: GIT_COMMIT_NAME
      GITEA_USERNAME:
        from_secret: GITEA_USERNAME
      GITEA_TOKEN:
        from_secret: GITEA_TOKEN
